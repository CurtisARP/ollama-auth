version: "3.9"
services:
  ollama-auth:
    build:
      context: https://github.com/CurtisARP/ollama-auth.git
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_UPSTREAM_URL=${OLLAMA_UPSTREAM_URL:-http://ollama:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-changeme}
    depends_on:
      - ollama
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://127.0.0.1/health'
      interval: 2s
      timeout: 10s
      retries: 10
      
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
