version: "3.9"
services:
  ollama-auth:
    build:
      context: https://github.com/CurtisARP/ollama-auth.git
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_UPSTREAM_URL=http://ollama:11434
      - OLLAMA_API_KEY=changeme
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
