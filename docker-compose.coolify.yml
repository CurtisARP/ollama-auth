version: "3.9"
services:
  ollama-auth:
    build:
      context: https://github.com/CurtisARP/ollama-auth.git
      dockerfile: Dockerfile
    environment:
      - OLLAMA_UPSTREAM_URL=${OLLAMA_UPSTREAM_URL:-http://ollama:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-changeme}
    depends_on:
      - ollama
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/health"]
      interval: 2s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 5s
      timeout: 30s
      retries: 10
networks:
  internal:
    driver: bridge
    internal: false

volumes:
  ollama-data: